name: release

# Cut a release by pushing a tag:  git tag v0.3.0 && git push origin v0.3.0
# This builds both binaries for two targets, renames + checksums them, and
# creates (or updates) the matching GitHub release with notes from CHANGELOG.md.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required for GITHUB_TOKEN to create the release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-unknown-linux-musl

      # zigbuild uses `zig cc` as the cross C compiler, so the bundled SQLite
      # (rusqlite) and ring/aws-lc C/asm cross-compile cleanly for musl, and we
      # can pin an old glibc for the gnu build so it runs on ancient distros too.
      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Test
        run: cargo test --workspace

      - name: Build (glibc 2.17 dynamic)
        run: cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.17

      - name: Build (fully static musl)
        run: cargo zigbuild --release --target x86_64-unknown-linux-musl

      - name: Stage + checksum artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/notion-sync     dist/notion-sync-x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/release/fidelity-probe  dist/fidelity-probe-x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-musl/release/notion-sync    dist/notion-sync-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/fidelity-probe dist/fidelity-probe-x86_64-unknown-linux-musl
          cd dist && sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Extract release notes from CHANGELOG.md
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v ver="$ver" '
            $0 ~ "^## \\[" ver "\\]" { f = 1; next }
            /^## \[/ { if (f) exit }
            f
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > RELEASE_NOTES.md
          fi
          echo "--- release notes ---"; cat RELEASE_NOTES.md

      - name: Create or update the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes-file RELEASE_NOTES.md \
              dist/*
          fi
